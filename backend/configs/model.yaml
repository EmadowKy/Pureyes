models:
  main_model_path: "Qwen/Qwen3-VL-2B-Instruct"

paths:
  output_dir: "../../output/output"
  video_frames_dir: "../../output/video_frames"
  key_frames_dir: "../../output/key_frames"
  Benchmark_name: "Benchmark"  # 基准测试名称

parameters:
  size: 360
  num_frames_iter: 4
  num_frames_noiter: 4
  num_gpus: 1
  # 任务数量, -1 表示所有
  num_tasks: -1
  sub_task: "all"
  save_key_frames: false
  save_video_frames: false
  number_type: "123"

  use_visual_answer: true # 是否提供关键帧图片 (对应 answer_visual_only 模版)
  use_text_answer: true # 是否提供文本描述 (对应 answer_text_only 模版)
  # 若两者均为 true, 则使用 answer_combined 模版
  print_output: false
  skip_iteration: false # 直接回答
  question_analysis: true # 是否进行问题分析，生成 question_analysis 模版所需的提示词

  # Agent 参数
  agent:
    global_max_iterations: 4 # 通过Tool Agent获取信息的全局最大迭代次数
    frame_bank_size: 4 # 每个视频最多取这么多帧
    initial_acceleration: 1.0
    min_acceleration_threshold: 0.2 # 单视频最低加速度阈值，低于则终止该视频
    max_score_threshold: 0.8 # 所有视频平均分数超过则整体终止

  type_watermark: "video_tag temporal_tag trans_frame" # 水印类型
  # 可选模式 (可叠加, 如"video_tag+temporal_tag"):
  # "video_tag": 视频标签 (左上角)
  # "temporal_tag": 时间戳 (左上角)
  # "trans_frame": 转场帧)
  # "none": 无水印
  priority_score_k: 1.0 # 优先级计算中加速权重k的值，默认1.0
  priority_score_t: 1.0 # 优先级计算中当前分数权重t的值，默认1.0
  # log_prefix: {Benchmark_name}_{date}_{time}_{type_watermark}

prompts:
  answer_combined: |
    /no_think
    /* 任务说明 */
    你是一个面向视频问答任务的答案生成模型。
    问题："{QUESTION}"

    你将看到来自多个视频的关键帧。每个帧左上角都有水印，标明其所属视频（如 Video 1、Video 2）及时间戳。
    同时你会获得每个视频的文本描述：
    {DESCRIPTIONS}

    你的任务是综合分析所有关键帧与视频描述来回答问题。请关注：
    1. 关键帧中与问题相关的具体视觉细节
    2. 每个视频描述中提到的事件与细节
    3. 视频之间的差异与相似之处

    **输出格式：**
    直接输出你的答案，无需额外解释、推理或其他文字。

  answer_visual_only: |
    /no_think
    /* 任务说明 */
    你是一个面向视频问答任务的答案生成模型。
    问题："{QUESTION}"

    你将看到来自多个视频的关键帧。每个帧左上角都有水印，标明其所属视频（如 Video 1、Video 2）及时间戳。

    你的任务是根据所有关键帧回答问题。请关注：
    1. 关键帧中与问题相关的具体视觉细节
    2. 每一帧所属的视频（由水印标明）
    3. 不同视频帧之间的差异与相似之处

    **输出格式：**
    直接输出你的答案，无需额外解释、推理或其他文字。

  answer_text_only: |
    /no_think
    /* 任务说明 */
    你是一个面向视频问答任务的答案生成模型。
    问题："{QUESTION}"

    你将获得各视频的详细文本描述：
    视频描述：
    {DESCRIPTIONS}

    你的任务是根据视频描述回答问题。请关注：
    1. 每个视频描述中的事件与细节
    2. 描述中提到的时间戳
    3. 基于描述的视频间差异与相似之处

    **输出格式：**
    直接输出你的答案，无需额外解释、推理或其他文字。

  question_analysis: |
    /no_think
    /* 任务说明 */
    你是视频问答任务的策略分析模型。
    问题："{QUESTION}"

    你的任务是分析问题，确定从视频中寻找答案的最优策略。

    请分析以下方面：
    1. 关键判别视觉特征或事件：模型需要寻找哪些具体视觉线索？
    2. 区分策略：如何根据视频内容区分答案可能性？

    - 策略长度控制在 30 词以内。

    /* 输出格式 */
    用简洁语句总结关键视觉特征与区分方法，不要使用列表，不要直接回答问题。

  tool_analylsis: |
    以下是辅助问题策略。它指出需要关注的关键视觉特征，帮助你为帧分配准确的相关性分数，并选择最佳采样动作以寻找缺失的判别线索：
    问题策略："{QUESTION_ANALYSIS}"

  desc_analysis: |
    以下是辅助问题策略。它强调回答问题所需的关键信息，帮助你提取高相关证据并判断视频是否包含可终止检索的决定性信息：
    问题策略："{QUESTION_ANALYSIS}"

  tool_combined_action: |
    /no_think
    /* 任务说明 */
    你是视频问答任务的视频探索智能体。
    问题："{QUESTION}"

    {TOOL_ANALYSIS}

    你一次只能观看一个视频。你会收到从 {VIDEO_LABEL} 的 {START_TIME}s 至 {END_TIME}s 均匀采样的 {NUM_FRAMES} 帧。视频总时长为 {DURATION}s。

    以下是可能有助于回答问题的额外信息，由证据提取智能体从当前 {VIDEO_LABEL}（当前视频信息）与其他视频（其他视频信息）中提取：
    当前视频信息："{CURRENT_VIDEO_DESC}"
    其他视频信息："{OTHER_VIDEOS_DESC}"

    你需要同时完成两项任务：
    1. 对来自 {VIDEO_LABEL} {START_TIME}s–{END_TIME}s 的每一帧进行评分。
    2. 决定下一步采样动作，在 {START_TIME}s–{END_TIME}s 范围内探索缺失线索。

    **注意：每一帧左上角标有具体时间戳（秒）。**

    /* 任务1：帧评分 */
    - 根据与当前视频信息的相关性，为每帧赋一个 0.00–1.00 的分数。示例：[0.50, 0.50, 0.50, 0.50]
    - 1.00：帧包含对问题有用的关键、直接视觉证据
    - 0.50：帧提供有用相关上下文，但非决定性
    - 0.00：帧无关、模糊或冗余

    /* 任务2：动作决策 */
    根据给定帧选择一个选项（1-6）。
    **重要：选项 1-2 必须指定目标时间范围 [start, end]，示例：[1.23, 4.56]**

    1. Maybe [start, end] is useful, but other part can be also useful: Explore the middle part of the video.
    2. I think [start, end] is useful and need to further explore: Explore the middle part of the video.
    3. do not choose this option
    4. do not choose this option
    5. I want to further observe the whole {VIDEO_LABEL} of {START_TIME}s to {END_TIME}s
    6. Terminate explore {VIDEO_LABEL} if we have sufficient information from {VIDEO_LABEL} to answer the question or {VIDEO_LABEL} appears irrelevant or useless to answer the question.

    /* 输出格式 */
    Scores: [<space-separated list of scores for each given frame>]
    Decision: Option <number> [Range: <start>, <end>]

    **注意：仅选项 1、2 需要范围，且必须在 {START_TIME}s–{END_TIME}s 内。**

  desc_combined_action: |
    /no_think
    /* 任务说明 */
    你是视频问答任务的证据提取智能体。
    问题："{QUESTION}"

    以下是辅助问题策略，用于提取高相关证据并判断视频是否包含决定性信息：
    问题策略："{QUESTION_ANALYSIS}"

    你一次只能查看一个视频，当前视频为 {VIDEO_LABEL}。

    {DESC_ANALYSIS}

    你需要同时完成两项任务：
    1. 从 {VIDEO_LABEL} 中提取对回答问题有帮助的新证据，不重复已有信息。
    2. 评估当前视频证据的置信分数并决定是否终止。

    /* 任务1：证据提取 */
    - 专注于提取对 {VIDEO_LABEL} 的证据与分析，而非泛泛描述。
    - 新证据控制在 20 词以内。
    - 不重复“历史证据”中已有的内容。

    /* 任务2：评估与终止 */
    - 分数 (0.00-1.00)：确定证据是否充分、有用，或可判定该视频对回答问题无用
    - 单个视频证据通常不足以回答整体问题，只要提供部分有效信息即可视为有用
    - 若确定视频与问题无关，也可打 1.00
    - 终止判断1（当前视频）：是否已获得足够信息，可停止探索该视频？（True/False）
    - 终止判断2（全局任务）：综合所有视频证据，是否足以确定答案？（True/False）

    /* 输出格式 */
    New Evidence: <clues extracted from the given {VIDEO_LABEL}>
    ---
    Score: <score>
    Video Terminated: <True/False>
    Global Terminated: <True/False>
